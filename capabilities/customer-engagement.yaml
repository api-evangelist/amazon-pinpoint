naftiko: "1.0.0-alpha1"

info:
  label: Amazon Pinpoint Customer Engagement
  description: Workflow capability for multi-channel customer engagement using Amazon Pinpoint. Combines campaign management, audience segmentation, customer journeys, and transactional messaging for marketing teams and growth engineers.
  tags:
    - Amazon
    - AWS
    - Marketing
    - Customer Engagement
    - Campaigns
    - Journeys
    - Segmentation
    - Messaging
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - import: amazon-pinpoint
      location: ./shared/amazon-pinpoint.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: customer-engagement-api
      description: Unified REST API for Amazon Pinpoint customer engagement workflows.
      resources:
        - path: /v1/apps
          name: apps
          description: Pinpoint application management
          operations:
            - method: GET
              name: list-apps
              description: List all Pinpoint applications
              call: "amazon-pinpoint.get-apps"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-app
              description: Create a new Pinpoint application
              call: "amazon-pinpoint.create-app"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/campaigns
          name: campaigns
          description: Marketing campaign management
          operations:
            - method: GET
              name: list-campaigns
              description: List campaigns for an application
              call: "amazon-pinpoint.get-campaigns"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-campaign
              description: Create a new marketing campaign
              call: "amazon-pinpoint.create-campaign"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/audiences
          name: audiences
          description: Audience segment management
          operations:
            - method: GET
              name: list-segments
              description: List audience segments
              call: "amazon-pinpoint.get-segments"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-segment
              description: Create a new audience segment
              call: "amazon-pinpoint.create-segment"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/journeys
          name: journeys
          description: Customer journey workflow management
          operations:
            - method: GET
              name: list-journeys
              description: List customer journeys
              call: "amazon-pinpoint.list-journeys"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-journey
              description: Create a new customer journey
              call: "amazon-pinpoint.create-journey"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/messages
          name: messages
          description: Send transactional messages
          operations:
            - method: POST
              name: send-messages
              description: Send transactional messages to customer endpoints
              call: "amazon-pinpoint.send-messages"
              with:
                application-id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: customer-engagement-mcp
      transport: http
      description: MCP server for AI-assisted customer engagement workflows with Amazon Pinpoint.
      tools:
        - name: list-apps
          description: List all Pinpoint applications
          hints:
            readOnly: true
            openWorld: true
          call: "amazon-pinpoint.get-apps"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-app
          description: Create a new Pinpoint application for customer engagement
          hints:
            readOnly: false
            destructive: false
          call: "amazon-pinpoint.create-app"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-campaigns
          description: List marketing campaigns for a Pinpoint application
          hints:
            readOnly: true
            openWorld: true
          call: "amazon-pinpoint.get-campaigns"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-campaign
          description: Create a new multi-channel marketing campaign
          hints:
            readOnly: false
            destructive: false
          call: "amazon-pinpoint.create-campaign"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-audience-segments
          description: List audience segments for targeting campaigns and journeys
          hints:
            readOnly: true
            openWorld: true
          call: "amazon-pinpoint.get-segments"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-audience-segment
          description: Create a new customer audience segment based on attributes or imported data
          hints:
            readOnly: false
            destructive: false
          call: "amazon-pinpoint.create-segment"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-journeys
          description: List automated customer journey workflows
          hints:
            readOnly: true
            openWorld: true
          call: "amazon-pinpoint.list-journeys"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-journey
          description: Create a multi-step automated customer engagement journey
          hints:
            readOnly: false
            destructive: false
          call: "amazon-pinpoint.create-journey"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: send-transactional-messages
          description: Send transactional messages (confirmations, alerts, notifications) to customer endpoints
          hints:
            readOnly: false
            destructive: false
          call: "amazon-pinpoint.send-messages"
          with:
            application-id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."
