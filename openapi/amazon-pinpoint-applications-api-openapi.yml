  description: The Amazon Pinpoint endpoint for China (Beijing) and China (Ningxia)
security:
- hmac: []
tags:
- name: Applications
  description: Operations for managing Pinpoint applications (projects)
paths:
  /v1/apps:
    post:
      operationId: CreateApp
      summary: Amazon Pinpoint Create an Application
      description: Creates a new Pinpoint application (project).
      tags:
      - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
    get:
      operationId: GetApps
      summary: Amazon Pinpoint List Applications
      description: Retrieves information about all applications associated with your account.
      tags:
      - Applications
      responses:
        '200':
          description: Applications retrieved successfully
  /v1/apps/{application-id}:
    get:
      operationId: GetApp
      summary: Amazon Pinpoint Get Application Details
      description: Retrieves information about an application.
      tags:
      - Applications
      parameters:
      - name: application-id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Application details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
components:
  schemas:
    CreateApplicationRequest:
      type: object
      required:
      - Name
      properties:
        Name:
          type: string
          description: The display name of the application
        tags:
          type: object
          additionalProperties:
            type: string
    ApplicationResponse:
      type: object
      properties:
        Id:
          type: string
        Arn:
          type: string
        Name:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
  url: https://docs.aws.amazon.com/pinpoint/
x-hasEquivalentPaths: true
