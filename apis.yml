- name: Amazon Pinpoint API
  description: The Amazon Pinpoint API enables you to create and manage marketing campaigns, send transactional messages, define audience segments, manage message templates, configure messaging 
    channels (email, SMS, push, voice), and analyze engagement metrics for multi-channel communications.
